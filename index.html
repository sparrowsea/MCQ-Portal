<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SALARIA - Master Revision Portal</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; color: #333; margin: 0; padding-bottom: 30px; display: flex; flex-direction: column; align-items: center; }
        
        .main-header { 
            width: 100%; background: #1a252f; color: #ffffff; text-align: center; padding: 25px 0; 
            font-size: 2.5rem; font-weight: bold; letter-spacing: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); 
            margin-bottom: 25px;
            animation: salariaPulse 5s ease-in-out infinite;
        }
        @keyframes salariaPulse {
            0%, 100% { opacity: 0.7; text-shadow: 0 0 5px rgba(255,255,255,0.2); }
            50% { opacity: 1; text-shadow: 0 0 15px rgba(255,255,255,0.6); }
        }

        .main-wrapper { display: flex; flex-wrap: wrap; gap: 20px; max-width: 1100px; width: 95%; justify-content: center; }
        .dashboard-screen { width: 100%; max-width: 1000px; }
        .subject-title { font-size: 1.8rem; color: #2c3e50; border-bottom: 3px solid #007bff; padding-bottom: 10px; margin-top: 40px; display: flex; justify-content: space-between; align-items: center;}
        .jkssb-title { border-bottom-color: #e53e3e; }
        .jkpsc-title { border-bottom-color: #38a169; }
        
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; margin-top: 20px; }
        .test-card { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; border-top: 4px solid #007bff; cursor: pointer; transition: 0.3s; }
        .test-card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        .test-card.jkssb-card { border-top-color: #e53e3e; }
        .test-card.jkpsc-card { border-top-color: #38a169; }
        
        .test-card h3 { margin: 0 0 10px 0; color: #2d3748; font-size: 1.4rem; }
        .test-card p { margin: 0 0 20px 0; color: #718096; font-size: 0.9rem;}
        
        .btn-start { background: #2d3748; color: white; padding: 10px 20px; border: none; border-radius: 6px; font-weight: bold; font-size: 1rem; width: 100%; cursor: pointer; }

        #test-wrapper { display: none; width: 100%; gap: 20px; max-width: 1100px; }
        .quiz-container { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); flex: 2; min-width: 320px; border-top: 5px solid #007bff; }
        .sidebar { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); flex: 1; min-width: 250px; align-self: flex-start; position: sticky; top: 20px; }
        .header-top { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        .timer { font-size: 1.5rem; font-weight: bold; color: #d9534f; background: #fff5f5; padding: 8px 15px; border-radius: 8px; border: 2px solid #feb2b2; font-family: monospace; width: 140px; text-align: center; }
        
        .option-label { display: block; background: #f7fafc; padding: 14px 18px; margin-bottom: 12px; border-radius: 8px; cursor: pointer; border: 1px solid #e2e8f0; }
        .option-label.correct { background: #d4edda; border-color: #c3e6cb; color: #155724; font-weight: bold; }
        .option-label.wrong { background: #f8d7da; border-color: #f5c6cb; color: #721c24; font-weight: bold; text-decoration: line-through; }
        .option-label.disabled { cursor: not-allowed; opacity: 0.8; }
        input[type="radio"] { display: none; }
        
        #explanation-box { display: none; background: #fffaf0; border-left: 5px solid #ed8936; padding: 15px; margin-top: 20px; font-size: 0.95rem; border-radius: 4px; }
        .palette-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 15px; }
        .palette-btn { padding: 12px 0; text-align: center; border-radius: 6px; border: 1px solid #e2e8f0; background: #fff; cursor: pointer; font-weight: bold; }
        .palette-btn.correct { background: #48bb78; color: white; }
        .palette-btn.wrong { background: #e53e3e; color: white; }
        .palette-btn.active { border: 2px solid #000; }
        
        .footer-tag { margin-top: 50px; color: #a0aec0; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="main-header">SALARIA</div>

<div id="main-dashboard" class="main-wrapper dashboard-screen">
    <div style="width: 100%;">
        <h3 class="subject-title jkssb-title">JKSSB Module</h3>
        <div class="card-grid">
            <div class="test-card jkssb-card" onclick="startTest('jkssb/computer/full')"><h3>Computer</h3><p>50 Qs Bank</p><button class="btn-start">Start</button></div>
        </div>

        <h3 class="subject-title jkpsc-title">JKPSC Module</h3>
        <div class="card-grid">
            <div class="test-card jkpsc-card" onclick="openPolityDashboard()"><h3>Polity</h3><p>71 Chapters</p><button class="btn-start">Open</button></div>
        </div>
        
        <div id="polity-section" style="display:none; margin-top: 20px;">
            <button onclick="backToMain()" style="padding:10px; cursor:pointer;">← Back to Main</button>
            <div class="card-grid" id="polity-chapters-grid"></div>
        </div>

        <div class="footer-tag">System Version: v2.0 - Fully Dynamic</div>
    </div>
</div>

<div class="main-wrapper" id="test-wrapper">
    <div class="quiz-container">
        <div class="header-top"><h1 id="quiz-title" style="font-size: 1.2rem;">Exam</h1><div class="timer" id="timer-display">00:00</div></div>
        <p>Question <span id="current-q">1</span> of <span id="total-qs-count">0</span></p>
        <h2 id="question-text" style="font-size: 1.1rem; line-height: 1.5;"></h2>
        <div id="options-container"></div>
        <div id="explanation-box"></div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button onclick="prevQuestion()" style="flex:1; padding:10px;">Previous</button>
            <button onclick="nextQuestion()" style="flex:1; padding:10px;">Next</button>
        </div>
        <button onclick="submitTest()" style="width:100%; margin-top:10px; padding:10px; background:#e53e3e; color:white; border:none; border-radius:5px; font-weight:bold;">End Session</button>
    </div>
    <div class="sidebar"><h3>Tracker</h3><div class="palette-grid" id="palette-grid"></div></div>
</div>

<div id="result-screen" class="main-wrapper" style="display:none; text-align:center;">
    <div style="background:white; padding:40px; border-radius:15px; width:100%;">
        <h1>Completed</h1>
        <h2 id="final-score" style="font-size:3rem; color:#2b6cb0;"></h2>
        <button onclick="location.reload()" style="padding:15px 30px; cursor:pointer;">Restart Portal</button>
    </div>
</div>

<script>
    let activeQuizData = [], currentQ = 0, userAnswers = [], endTime, timerInterval;

    function openPolityDashboard() {
        document.querySelector('.card-grid').style.display = 'none';
        document.querySelectorAll('.subject-title').forEach(el => el.style.display = 'none');
        document.getElementById('polity-section').style.display = 'block';
        
        let html = '';
        for(let i=1; i<=71; i++) {
            // Using standard string addition to be bulletproof
            html += '<div class="test-card" onclick="startTest(\'jkpsc/polity/ch' + i + '\')"><h3>Chapter ' + i + '</h3><button class="btn-start">Start</button></div>';
        }
        document.getElementById('polity-chapters-grid').innerHTML = html;
    }

    function backToMain() { location.reload(); }

    async function startTest(path) {
        document.getElementById('main-dashboard').style.display = 'none';
        document.getElementById('test-wrapper').style.display = 'flex';
        document.getElementById('question-text').innerText = "Loading " + path + "...";

        const target = 'data/' + path + '.json';

        try {
            const res = await fetch(target);
            if (!res.ok) throw new Error();
            activeQuizData = await res.json();
            userAnswers = new Array(activeQuizData.length).fill(null);
            currentQ = 0;
            document.getElementById('total-qs-count').innerText = activeQuizData.length;
            
            let gridHtml = '';
            activeQuizData.forEach((_, i) => {
                gridHtml += '<div class="palette-btn" id="pal-' + i + '" onclick="loadQuestion(' + i + ')">' + (i + 1) + '</div>';
            });
            document.getElementById('palette-grid').innerHTML = gridHtml;
            
            endTime = Date.now() + (activeQuizData.length * 60 * 1000);
            startTimer();
            loadQuestion(0);
        } catch (e) {
            alert("⚠️ Missing Database File\nPath: " + target + "\n\nMake sure the file exists in your GitHub 'data' folder.");
            location.reload();
        }
    }

    function loadQuestion(idx) {
        currentQ = idx;
        document.getElementById('current-q').innerText = idx + 1;
        document.getElementById('question-text').innerText = activeQuizData[idx].question;
        document.querySelectorAll('.palette-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('pal-' + idx).classList.add('active');
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        const answered = userAnswers[idx] !== null;
        
        activeQuizData[idx].options.forEach((opt, i) => {
            const label = document.createElement('label');
            label.className = 'option-label';
            if (answered) {
                label.classList.add('disabled');
                if (i === activeQuizData[idx].answer) label.classList.add('correct');
                else if (i === userAnswers[idx]) label.classList.add('wrong');
                label.innerText = opt;
            } else {
                label.innerHTML = '<input type="radio" onclick="selectOption(' + i + ')"> ' + opt;
            }
            container.appendChild(label);
        });
        
        const exp = document.getElementById('explanation-box');
        exp.style.display = answered ? 'block' : 'none';
        if(answered) exp.innerHTML = "<strong>Explanation:</strong> " + activeQuizData[idx].explanation;
    }

    function selectOption(idx) {
        if (userAnswers[currentQ] !== null) return;
        userAnswers[currentQ] = idx;
        const correct = idx === activeQuizData[currentQ].answer;
        document.getElementById('pal-' + currentQ).classList.add(correct ? 'correct' : 'wrong');
        loadQuestion(currentQ);
    }

    function nextQuestion() { if(currentQ < activeQuizData.length - 1) loadQuestion(currentQ + 1); }
    function prevQuestion() { if(currentQ > 0) loadQuestion(currentQ - 1); }

    function startTimer() {
        timerInterval = setInterval(() => {
            const diff = endTime - Date.now();
            if (diff <= 0) { clearInterval(timerInterval); submitTest(); return; }
            const m = Math.floor(diff / 60000), s = Math.floor((diff % 60000) / 1000);
            document.getElementById('timer-display').innerText = m + ":" + String(s).padStart(2, '0');
        }, 1000);
    }

    function submitTest() {
        clearInterval(timerInterval);
        document.getElementById('test-wrapper').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        const score = userAnswers.filter((ans, i) => ans === activeQuizData[i].answer).length;
        document.getElementById('final-score').innerText = score + " / " + activeQuizData.length;
    }
</script>
</body>
</html>
