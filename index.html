<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JKSSB Computer Science MCQ Portal</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .quiz-container {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            max-width: 700px;
            width: 100%;
        }
        h1 { text-align: center; color: #2c3e50; font-size: 1.5rem; border-bottom: 2px solid #eee; padding-bottom: 10px;}
        h2 { margin-top: 20px; font-size: 1.2rem; color: #34495e; }
        .options { margin: 20px 0; }
        .option-label {
            display: block;
            background: #e9ecef;
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid #ced4da;
        }
        .option-label:hover { background: #dce1e6; border-color: #b1b8bb; }
        input[type="radio"] { margin-right: 15px; transform: scale(1.2); }
        .btn-group { display: flex; justify-content: space-between; margin-top: 20px; }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.3s;
        }
        #next-btn { background: #007bff; color: #fff; display: none; width: 100%; }
        #next-btn:hover { background: #0056b3; }
        #feedback { margin-top: 20px; font-weight: bold; display: none; padding: 15px; border-radius: 5px; font-size: 1rem; }
        .correct { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .incorrect { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .score-display { text-align: center; font-size: 1.5rem; font-weight: bold; color: #28a745; margin-top: 20px;}
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>JKSSB Computer Section Mock Test</h1>
    <div id="quiz-header">
        <p><strong>Question <span id="current-q">1</span> of <span id="total-q">61</span></strong></p>
    </div>
    
    <h2 id="question-text">Loading question...</h2>
    
    <div class="options" id="options-container">
        </div>

    <div id="feedback"></div>

    <div class="btn-group">
        <button id="next-btn" onclick="loadNextQuestion()">Next Question</button>
    </div>
    
    <div id="final-score" class="score-display" style="display: none;"></div>
</div>

<script>
    const quizData = [
        // --- EASTER EGG ---
        { question: "Who is the bosss?", options: ["A) Rajput hunde surme", "B) Gagan", "C) Akash", "D) Avneet", "E) Sumit"], answer: 0, explanation: "Rajput hunde surme! The undisputed boss." },

        // --- SECTION 1: INVENTORS, FATHERS & INVENTIONS ---
        { question: "Who is known as the Father of the Computer?", options: ["A) Alan Turing", "B) Charles Babbage", "C) Blaise Pascal", "D) Herman Hollerith"], answer: 1, explanation: "Charles Babbage is known as the Father of the Computer for inventing the Analytical Engine." },
        { question: "Who invented the World Wide Web (WWW)?", options: ["A) Tim Berners-Lee", "B) Vint Cerf", "C) Bill Gates", "D) Steve Jobs"], answer: 0, explanation: "Tim Berners-Lee invented the World Wide Web in 1989." },
        { question: "Who is credited with the invention of the computer mouse?", options: ["A) Douglas Engelbart", "B) Christopher Sholes", "C) Ray Tomlinson", "D) Dennis Ritchie"], answer: 0, explanation: "Douglas Engelbart invented the computer mouse in the 1960s." },
        { question: "Who is considered the creator of the first electronic email system?", options: ["A) Mark Zuckerberg", "B) Larry Page", "C) Ray Tomlinson", "D) Paul Allen"], answer: 2, explanation: "Ray Tomlinson implemented the first email system on the ARPANET system in 1971." },
        { question: "Who is widely recognized as the Father of Artificial Intelligence?", options: ["A) Alan Turing", "B) John McCarthy", "C) Charles Babbage", "D) John von Neumann"], answer: 1, explanation: "John McCarthy coined the term Artificial Intelligence in 1955." },
        { question: "Who is known as the first computer programmer?", options: ["A) Ada Lovelace", "B) Grace Hopper", "C) Margaret Hamilton", "D) Joan Clarke"], answer: 0, explanation: "Ada Lovelace is considered the first computer programmer for her work on Charles Babbage's Analytical Engine." },
        { question: "Who invented the C programming language?", options: ["A) James Gosling", "B) Guido van Rossum", "C) Dennis Ritchie", "D) Bjarne Stroustrup"], answer: 2, explanation: "Dennis Ritchie created the C programming language at Bell Labs in 1972." },
        { question: "Who is known as the Father of the Internet?", options: ["A) Vint Cerf", "B) Tim Berners-Lee", "C) Marc Andreessen", "D) Robert Kahn"], answer: 0, explanation: "Vint Cerf (along with Bob Kahn) is known as the Father of the Internet for co-developing the TCP/IP protocols." },
        { question: "Who invented the QWERTY keyboard layout?", options: ["A) Christopher Latham Sholes", "B) Douglas Engelbart", "C) Johannes Gutenberg", "D) Thomas Edison"], answer: 0, explanation: "Christopher Latham Sholes invented the QWERTY layout for typewriters in 1873." },
        { question: "Who developed the first microprocessor (Intel 4004)?", options: ["A) Gordon Moore", "B) Marcian Hoff", "C) Robert Noyce", "D) Jack Kilby"], answer: 1, explanation: "Marcian 'Ted' Hoff was the co-inventor of the first microprocessor, the Intel 4004." },
        { question: "Who invented the Integrated Circuit (IC)?", options: ["A) Jack Kilby and Robert Noyce", "B) Steve Jobs and Steve Wozniak", "C) Bill Gates and Paul Allen", "D) Larry Page and Sergey Brin"], answer: 0, explanation: "Jack Kilby and Robert Noyce independently invented the Integrated Circuit in 1958/1959." },
        { question: "Who developed the Linux operating system kernel?", options: ["A) Richard Stallman", "B) Linus Torvalds", "C) Ken Thompson", "D) Bill Joy"], answer: 1, explanation: "Linus Torvalds created the Linux kernel in 1991." },
        { question: "Who founded Microsoft?", options: ["A) Steve Jobs & Steve Wozniak", "B) Bill Gates & Paul Allen", "C) Larry Ellison", "D) Jeff Bezos"], answer: 1, explanation: "Microsoft was founded by Bill Gates and Paul Allen in 1975." },
        { question: "Who invented the floppy disk?", options: ["A) IBM (Alan Shugart)", "B) Apple (Steve Wozniak)", "C) Microsoft (Bill Gates)", "D) Sony"], answer: 0, explanation: "The floppy disk was invented at IBM by a team led by Alan Shugart in 1967." },
        { question: "Who is known as the Father of Personal Computing?", options: ["A) Henry Edward Roberts", "B) Steve Jobs", "C) Bill Gates", "D) Charles Babbage"], answer: 0, explanation: "Ed Roberts is often called the Father of the Personal Computer for inventing the Altair 8800." },
        { question: "Who invented the compiler for computer programming languages?", options: ["A) Ada Lovelace", "B) Grace Hopper", "C) Alan Turing", "D) John Backus"], answer: 1, explanation: "Admiral Grace Hopper invented the first compiler (A-0 System) and helped develop COBOL." },
        { question: "Who created the Java programming language?", options: ["A) Dennis Ritchie", "B) James Gosling", "C) Bjarne Stroustrup", "D) Anders Hejlsberg"], answer: 1, explanation: "James Gosling developed Java while working at Sun Microsystems in 1995." },
        { question: "Who invented the Python programming language?", options: ["A) Guido van Rossum", "B) Larry Wall", "C) Yukihiro Matsumoto", "D) Brendan Eich"], answer: 0, explanation: "Guido van Rossum created Python in 1991." },
        { question: "Who developed the concept of the Stored-Program Computer?", options: ["A) Alan Turing", "B) John von Neumann", "C) Howard Aiken", "D) Konrad Zuse"], answer: 1, explanation: "John von Neumann developed the von Neumann architecture, detailing a stored-program computer." },
        { question: "Who invented the punch card tabulating machine used in the 1890 census?", options: ["A) Herman Hollerith", "B) Charles Babbage", "C) Joseph Marie Jacquard", "D) Blaise Pascal"], answer: 0, explanation: "Herman Hollerith invented the tabulating machine and later founded the company that became IBM." },

        // --- SECTION 2: FULL FORMS & ABBREVIATIONS ---
        { question: "What does CPU stand for?", options: ["A) Central Process Unit", "B) Computer Personal Unit", "C) Central Processing Unit", "D) Central Processor Unit"], answer: 2, explanation: "CPU stands for Central Processing Unit, the brain of the computer." },
        { question: "What does RAM stand for?", options: ["A) Read Access Memory", "B) Random Access Memory", "C) Run Accept Memory", "D) Random Active Memory"], answer: 1, explanation: "RAM stands for Random Access Memory, the primary volatile memory of a computer." },
        { question: "What is the full form of ROM?", options: ["A) Read Only Memory", "B) Random Only Memory", "C) Read Output Memory", "D) Real Object Memory"], answer: 0, explanation: "ROM stands for Read Only Memory, non-volatile memory containing boot instructions." },
        { question: "What does BIOS stand for?", options: ["A) Basic Input Output System", "B) Broad Integrated Operating System", "C) Basic Internal Output System", "D) Base Input Output Service"], answer: 0, explanation: "BIOS is firmware used to perform hardware initialization." },
        { question: "What does GUI stand for?", options: ["A) Graphical User Instrument", "B) General Utility Interface", "C) Graphical User Interface", "D) General User Input"], answer: 2, explanation: "GUI is a Graphical User Interface, allowing users to interact via icons instead of text commands." },
        { question: "What is the full form of URL?", options: ["A) Uniform Resource Locator", "B) Universal Record Link", "C) Uniform Resource Link", "D) Universal Routing Locator"], answer: 0, explanation: "URL stands for Uniform Resource Locator, the address of a web page." },
        { question: "What does HTTP stand for?", options: ["A) HyperText Transfer Protocol", "B) HyperText Transmission Process", "C) High Transfer Text Protocol", "D) Hyper Transfer Text Protocol"], answer: 0, explanation: "HTTP is the foundation of data communication for the World Wide Web." },
        { question: "What is the full form of PDF?", options: ["A) Printable Document Format", "B) Portable Document Format", "C) Public Document File", "D) Portable Data File"], answer: 1, explanation: "PDF stands for Portable Document Format, developed by Adobe." },
        { question: "What does SMTP stand for?", options: ["A) Secure Mail Transfer Protocol", "B) Standard Mail Transmission Protocol", "C) Simple Mail Transfer Protocol", "D) System Mail Transfer Protocol"], answer: 2, explanation: "SMTP is the standard protocol for sending emails." },
        { question: "What does USB stand for?", options: ["A) Universal Serial Bus", "B) Universal System Bus", "C) Uniform Serial Bus", "D) Universal Sync Bus"], answer: 0, explanation: "USB is an industry standard for connection, communication, and power supply between computers and devices." },
        { question: "What does LAN stand for?", options: ["A) Local Area Network", "B) Logical Area Network", "C) Large Area Network", "D) Local Access Network"], answer: 0, explanation: "A LAN is a computer network that interconnects computers within a limited area like a residence or office." },
        { question: "What is the full form of WAN?", options: ["A) Wide Area Network", "B) Wireless Area Network", "C) Web Area Network", "D) World Area Network"], answer: 0, explanation: "WAN stands for Wide Area Network, which extends over a large geographical distance." },
        { question: "What does Wi-Fi stand for?", options: ["A) Wireless Fidelity", "B) Wireless Fiber", "C) Wired Fidelity", "D) Wireless Finding"], answer: 0, explanation: "Wi-Fi commonly stands for Wireless Fidelity." },
        { question: "What is the full form of MAC in MAC address?", options: ["A) Media Access Control", "B) Memory Access Control", "C) Media Active Control", "D) Machine Access Control"], answer: 0, explanation: "A MAC address is a unique identifier assigned to a network interface controller." },
        { question: "What does IP stand for in IP Address?", options: ["A) Internet Protocol", "B) Intranet Protocol", "C) Internal Protocol", "D) Information Protocol"], answer: 0, explanation: "IP stands for Internet Protocol, the principal set of rules for routing data across networks." },
        { question: "What is the full form of HTML?", options: ["A) HyperText Markup Language", "B) HyperText Machine Language", "C) HighText Markup Language", "D) Hyper Tool Markup Language"], answer: 0, explanation: "HTML is the standard markup language for documents designed to be displayed in a web browser." },
        { question: "What does SSD stand for?", options: ["A) Solid State Drive", "B) Super Speed Drive", "C) Solid System Disk", "D) Secure Storage Drive"], answer: 0, explanation: "SSD stands for Solid State Drive, a fast, flash-based storage device." },
        { question: "What is the full form of VPN?", options: ["A) Virtual Private Network", "B) Visual Private Network", "C) Virtual Public Network", "D) Verified Private Network"], answer: 0, explanation: "A VPN establishes a protected network connection when routing through public networks." },
        { question: "What does DNS stand for?", options: ["A) Domain Name System", "B) Data Network Service", "C) Digital Name Server", "D) Dynamic Network System"], answer: 0, explanation: "DNS translates human-readable domain names (like google.com) to machine-readable IP addresses." },
        { question: "What is the full form of SMPS?", options: ["A) Switched-Mode Power Supply", "B) Simple Mode Power Supply", "C) Storage Mode Power Supply", "D) System Main Power Supply"], answer: 0, explanation: "SMPS is an electronic power supply that incorporates a switching regulator to convert electrical power efficiently." },
        { question: "What does ASCII stand for?", options: ["A) American Standard Code for Information Interchange", "B) American Scientific Code for Information Interchange", "C) Asian Standard Code for Information Interchange", "D) American Standard Computer for Information Interchange"], answer: 0, explanation: "ASCII is a character encoding standard for electronic communication." },
        { question: "What is the full form of MODEM?", options: ["A) Modulator-Demodulator", "B) Modern-Demodern", "C) Module-Demodule", "D) Machine-Demachine"], answer: 0, explanation: "A modem modulates and demodulates electrical signals sent through phone lines or cables." },
        { question: "What does OMR stand for?", options: ["A) Optical Mark Recognition", "B) Optical Machine Reader", "C) Output Mark Recognition", "D) Optical Magnetic Reader"], answer: 0, explanation: "OMR is the process of capturing human-marked data from document forms such as surveys and tests." },
        { question: "What does MICR stand for?", options: ["A) Magnetic Ink Character Recognition", "B) Magnetic Information Computer Recognition", "C) Machine Ink Character Reader", "D) Magnetic Ink Code Reader"], answer: 0, explanation: "MICR is a technology used primarily by the banking industry to streamline the processing of cheques." },
        { question: "What does CC stand for in an email?", options: ["A) Carbon Copy", "B) Blind Carbon Copy", "C) Computer Copy", "D) Current Copy"], answer: 0, explanation: "CC stands for Carbon Copy, used to send a copy of an email to someone other than the primary recipient." },

        // --- SECTION 3: SHORTCUT KEYS ---
        { question: "Which shortcut key is used to Undo the last action?", options: ["A) Ctrl + X", "B) Ctrl + Y", "C) Ctrl + U", "D) Ctrl + Z"], answer: 3, explanation: "Ctrl + Z is the universal shortcut to undo an action." },
        { question: "Which shortcut key is used to Select All text or items?", options: ["A) Ctrl + S", "B) Ctrl + A", "C) Ctrl + Shift + A", "D) Alt + A"], answer: 1, explanation: "Ctrl + A selects everything in the current document or window." },
        { question: "Which shortcut key is used to Copy selected text?", options: ["A) Ctrl + X", "B) Ctrl + P", "C) Ctrl + C", "D) Ctrl + V"], answer: 2, explanation: "Ctrl + C copies the selected item to the clipboard." },
        { question: "Which shortcut key is used to Paste copied text?", options: ["A) Ctrl + P", "B) Ctrl + V", "C) Ctrl + X", "D) Shift + P"], answer: 1, explanation: "Ctrl + V pastes the contents of the clipboard." },
        { question: "Which shortcut key is used to Cut selected text?", options: ["A) Ctrl + C", "B) Ctrl + K", "C) Ctrl + X", "D) Ctrl + Z"], answer: 2, explanation: "Ctrl + X removes the selected item and places it on the clipboard." },
        { question: "Which shortcut key is used to Save a document?", options: ["A) Ctrl + S", "B) Alt + S", "C) F12", "D) Ctrl + D"], answer: 0, explanation: "Ctrl + S saves the current document." },
        { question: "In MS Word, which shortcut key is used to Center Align text?", options: ["A) Ctrl + C", "B) Ctrl + E", "C) Ctrl + J", "D) Ctrl + R"], answer: 1, explanation: "Ctrl + E aligns the selected paragraph to the center." },
        { question: "In MS Excel, which key is used to Edit the active cell?", options: ["A) F2", "B) F4", "C) F5", "D) F7"], answer: 0, explanation: "Pressing F2 enters edit mode for the currently active cell." },
        { question: "Which shortcut key is used to insert a New Slide in MS PowerPoint?", options: ["A) Ctrl + N", "B) Ctrl + S", "C) Ctrl + M", "D) Ctrl + K"], answer: 2, explanation: "Ctrl + M inserts a new slide, whereas Ctrl + N opens a completely new presentation file." },
        { question: "Which shortcut key is used to Print a document?", options: ["A) Ctrl + P", "B) Alt + P", "C) Ctrl + Shift + P", "D) F8"], answer: 0, explanation: "Ctrl + P opens the print dialog box." },
        { question: "Which function key is used to check Spelling and Grammar in MS Office?", options: ["A) F2", "B) F5", "C) F7", "D) F12"], answer: 2, explanation: "F7 opens the spelling and grammar checker." },
        { question: "Which shortcut key is used to switch between open applications in Windows?", options: ["A) Ctrl + Tab", "B) Alt + Tab", "C) Windows + Tab", "D) Shift + Tab"], answer: 1, explanation: "Alt + Tab allows you to quickly cycle through open programs." },
        { question: "Which shortcut is used to close the currently active window or application?", options: ["A) Ctrl + W", "B) Alt + F4", "C) Ctrl + Esc", "D) Windows + D"], answer: 1, explanation: "Alt + F4 closes the active item or exits the active app." },
        { question: "Which key combination permanently deletes a file without sending it to the Recycle Bin?", options: ["A) Delete", "B) Shift + Delete", "C) Ctrl + Delete", "D) Alt + Delete"], answer: 1, explanation: "Shift + Delete permanently removes a file from the system." },
        { question: "Which keyboard shortcut instantly locks your Windows PC screen?", options: ["A) Ctrl + L", "B) Windows Key + L", "C) Alt + L", "D) Shift + L"], answer: 1, explanation: "Windows Key + L immediately locks your screen to protect privacy." }
    ];

    let currentQuestionIndex = 0;
    let score = 0;

    const questionText = document.getElementById('question-text');
    const optionsContainer = document.getElementById('options-container');
    const feedback = document.getElementById('feedback');
    const nextBtn = document.getElementById('next-btn');
    const currentQSpan = document.getElementById('current-q');
    const totalQSpan = document.getElementById('total-q');
    const finalScoreDisplay = document.getElementById('final-score');

    totalQSpan.innerText = quizData.length;

    function loadQuestion() {
        feedback.style.display = 'none';
        nextBtn.style.display = 'none';
        optionsContainer.innerHTML = '';
        
        const currentData = quizData[currentQuestionIndex];
        currentQSpan.innerText = currentQuestionIndex + 1;
        questionText.innerHTML = currentData.question;

        currentData.options.forEach((option, index) => {
            const label = document.createElement('label');
            label.className = 'option-label';
            label.innerHTML = `<input type="radio" name="quiz" value="${index}" onclick="checkAnswer(${index})"> ${option}`;
            optionsContainer.appendChild(label);
        });
    }

    function checkAnswer(selectedIndex) {
        const currentData = quizData[currentQuestionIndex];
        const radios = document.querySelectorAll('input[type="radio"]');
        radios.forEach(radio => radio.disabled = true);

        feedback.style.display = 'block';
        if (selectedIndex === currentData.answer) {
            feedback.innerHTML = `✅ Correct! <br><br> <i>${currentData.explanation}</i>`;
            feedback.className = 'correct';
            score++;
        } else {
            feedback.innerHTML = `❌ Incorrect. <br><br> <i>${currentData.explanation}</i>`;
            feedback.className = 'incorrect';
        }

        nextBtn.style.display = 'block';
        if (currentQuestionIndex === quizData.length - 1) {
            nextBtn.innerText = "See Final Score";
        }
    }

    function loadNextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < quizData.length) {
            loadQuestion();
        } else {
            document.getElementById('quiz-header').style.display = 'none';
            questionText.style.display = 'none';
            optionsContainer.style.display = 'none';
            feedback.style.display = 'none';
            nextBtn.style.display = 'none';
            finalScoreDisplay.style.display = 'block';
            finalScoreDisplay.innerText = `Quiz Completed! Your Score: ${score} out of ${quizData.length}`;
        }
    }

    // Initialize first question
    loadQuestion();
</script>

</body>
</html>
